name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.4
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Lint
        run: make lint-check

  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: "Swift 5.10 (Build & Test)"
            xcode: "15.4"
            runner: macos-14
            run-tests: true
            consumer-tests: false
            swift-testing-consumer: false
          - name: "Swift 6.0 (Build & Test)"
            xcode: "16.2"
            runner: macos-15
            run-tests: true
            consumer-tests: true
          - name: "Swift 6.1 (Build & Test)"
            xcode: "16.4"
            runner: macos-15
            run-tests: true
            consumer-tests: true
            swift-testing-consumer: true
            coverage: true
          - name: "Swift 6.2 (Build & Test)"
            xcode: "26.2"
            runner: macos-26
            run-tests: true
            consumer-tests: true
            swift-testing-consumer: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Build
        run: swift build --build-tests

      - name: Build Swift6Consumer integration test
        if: ${{ matrix.consumer-tests }}
        run: make build-swift6-consumer

      - name: Build XCTest consumer integration test
        if: ${{ matrix.consumer-tests }}
        run: make build-xctest-consumer

      - name: Run tests
        if: ${{ matrix.run-tests && !matrix.coverage }}
        run: make test

      - name: Run tests with coverage
        if: ${{ matrix.coverage }}
        run: swift test --enable-code-coverage

      - name: Coverage report
        if: ${{ matrix.coverage }}
        run: |
          BIN=$(swift build --show-bin-path)
          xcrun llvm-cov report \
            "$BIN/AirgapPackageTests.xctest/Contents/MacOS/AirgapPackageTests" \
            -instr-profile "$(find .build -name default.profdata -type f)" \
            -ignore-filename-regex='\.build|Tests'

      - name: Export lcov coverage
        if: ${{ matrix.coverage }}
        run: |
          BIN=$(swift build --show-bin-path)
          xcrun llvm-cov export \
            "$BIN/AirgapPackageTests.xctest/Contents/MacOS/AirgapPackageTests" \
            -instr-profile "$(find .build -name default.profdata -type f)" \
            -format lcov \
            -ignore-filename-regex='\.build|Tests' \
            > coverage.lcov

      - name: Upload coverage artifact
        if: ${{ matrix.coverage }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
          retention-days: 14

      - name: Test XCTest consumer integration
        if: ${{ matrix.run-tests && matrix.consumer-tests }}
        run: make test-xctest-consumer

      - name: Test NSPrincipalClass consumer integration
        if: ${{ matrix.run-tests && matrix.consumer-tests }}
        run: make test-nsprincipalclass-consumer

      - name: Test Swift Testing consumer integration
        if: ${{ matrix.swift-testing-consumer }}
        run: make test-swift-testing-consumer
