name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - name: "Swift 6.0 (Build Only)"
            xcode: "16.2"
            runner: macos-15
            run-tests: false
          - name: "Swift 6.1 (Build & Test)"
            xcode: "16.4"
            runner: macos-15
            run-tests: true
          - name: "Swift 6.2 (Build & Test)"
            xcode: "26.2"
            runner: macos-26
            run-tests: true
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Build
        run: swift build --build-tests

      - name: Build consumer integration test
        run: swift build --package-path IntegrationTests/Swift6Consumer

      - name: Run tests
        if: ${{ matrix.run-tests }}
        run: swift test
